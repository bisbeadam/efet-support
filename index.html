<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eFet — Support</title>
<meta name="description" content="eFet support page">
<link rel="icon" type="image/png" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="chalk-texture" aria-hidden="true"></div>

<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="#top">
      <img src="icon.png" alt="" class="brand-icon">
      <span class="brand-name">eFet</span>
    </a>
    <div class="lang-picker">
      <label for="lang-select" class="sr-only">Language</label>
      <select id="lang-select" aria-label="Choose language"></select>
    </div>
  </div>
</header>

<main id="top">

  <section class="hero">
    <div class="wrap">
      <p class="eyebrow" data-i18n="eyebrow">Support</p>
      <h1 id="page-title">eFet</h1>
      <p class="hero-sum" id="what-is-text"></p>
      <div class="hero-equation" aria-hidden="true">
        <svg viewBox="0 0 520 120" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="85" class="chalk-eq">7 × 8 = 56</text>
        </svg>
      </div>
    </div>
  </section>

  <section class="section" id="how">
    <div class="wrap">
      <h2 data-i18n-heading="how">How it works</h2>
      <ol class="steps" id="steps-list"></ol>
      <p class="note" id="perm-note"></p>
    </div>
  </section>

  <section class="section alt" id="languages">
    <div class="wrap">
      <h2 data-i18n-heading="languages">Available languages</h2>
      <p id="langs-intro"></p>
      <p class="callout-title" id="jazh-intro"></p>
      <ul class="jazh-list">
        <li id="ja-bullet"></li>
        <li id="zh-bullet"></li>
      </ul>
      <p id="langs-closing"></p>
    </div>
  </section>

  <section class="section" id="faq">
    <div class="wrap">
      <h2 data-i18n-heading="faq">FAQ</h2>
      <div class="faq-list" id="faq-list"></div>
    </div>
  </section>

  <section class="section alt" id="contact">
    <div class="wrap wrap-narrow">
      <h2 data-i18n-heading="contact">Contact us</h2>
      <form id="contact-form">
        <label id="label-reason" for="reason"></label>
        <select id="reason" name="reason" required></select>

        <label id="label-name" for="name"></label>
        <input id="name" name="name" type="text" autocomplete="name">

        <label id="label-email" for="email"></label>
        <input id="email" name="email" type="email" required autocomplete="email">

        <label id="label-message" for="message"></label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit" id="send-btn"></button>
      </form>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="wrap">
    <p>eFet · efet@bblp.cat · <a href="privacy.html">Privacy Policy</a></p>
  </div>
</footer>

<script src="translations.js"></script>
<script src="script.js"></script>
</body>
</html>
